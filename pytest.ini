[pytest]
# Default run skips tests marked llm (real Anthropic API; opt in with `pytest -m llm`),
# e2e (browser-driven; opt in with `pytest -m e2e`), and live_db (requires populated
# dev DB and a running OntServe MCP server; opt in with `pytest -m live_db`).
addopts = -ra -m "not llm and not e2e and not live_db"
# Only look for tests inside the top-level tests/ folder
testpaths = tests
# Standard filename patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Do not recurse into legacy archives or other noise
norecursedirs =
    .*
    build
    dist
    node_modules
    venv
    .venv
    archive
    backups
    logs
    tests/legacy_root_*
    tests/legacy*
    tests/e2e
# Marker taxonomy (pre-declare to avoid warnings)
markers =
    unit: fast, hermetic unit tests
    integration: db- or service-dependent tests
    db: requires a running PostgreSQL instance (pgvector enabled)
    e2e: end-to-end browser tests (requires running server and playwright)
    llm: requires real LLM API access (skipped without ANTHROPIC_API_KEY)
    live_db: requires populated dev DB plus running OntServe MCP server
filterwarnings = 
    ignore::DeprecationWarning
