{% extends "base.html" %}

{% block title %}Provenance - {{ case.title }} - ProEthica{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <!-- Header -->
    <div class="row mb-3">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="mb-0">
                        <i class="bi bi-diagram-3"></i> Provenance
                    </h1>
                    <p class="text-muted mb-0">Case {{ case.id }}: {{ case.title }}</p>
                </div>
                <div class="d-flex gap-2">
                    <a href="{{ url_for('prompt_editor.index') }}" class="btn btn-outline-secondary">
                        <i class="bi bi-pencil-square"></i> Edit Templates
                    </a>
                    <button class="btn btn-outline-info" data-bs-toggle="modal" data-bs-target="#activityLogModal" id="activityLogBtn">
                        <i class="bi bi-clock-history"></i> Activity Log
                    </button>
                    <a href="{{ url_for('entity_review.review_case_entities', case_id=case.id) }}" class="btn btn-outline-primary">
                        <i class="bi bi-list-check"></i> Review
                    </a>
                    <a href="{{ url_for('scenario_pipeline.overview', case_id=case.id) }}" class="btn btn-outline-primary">
                        <i class="bi bi-list-ul"></i> Pipeline
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Filter Bar -->
    <div class="row mb-3">
        <div class="col-12">
            <div class="card filter-bar">
                <div class="card-body py-2">
                    <div class="d-flex align-items-center gap-3">
                        <label class="text-muted small mb-0">Filter:</label>
                        <select id="filter-step" class="form-select form-select-sm" style="width: auto;" onchange="applyFilters()">
                            <option value="">All Steps</option>
                            <option value="1" {% if initial_step == 1 %}selected{% endif %}>Step 1: Contextual</option>
                            <option value="2" {% if initial_step == 2 %}selected{% endif %}>Step 2: Normative</option>
                            <option value="3" {% if initial_step == 3 %}selected{% endif %}>Step 3: Temporal</option>
                            <option value="4">Step 4: Synthesis</option>
                            <option value="qc">QC Verification</option>
                            <option value="refinements">Manual Refinements</option>
                        </select>
                        <select id="filter-section" class="form-select form-select-sm" style="width: auto;" onchange="applyFilters()">
                            <option value="">All Sections</option>
                            <option value="facts" {% if initial_section == 'facts' %}selected{% endif %}>Facts</option>
                            <option value="discussion" {% if initial_section == 'discussion' %}selected{% endif %}>Discussion</option>
                        </select>
                        <select id="filter-concept" class="form-select form-select-sm" style="width: auto;" onchange="applyFilters()">
                            <option value="">All Concepts</option>
                            <option value="roles">Roles</option>
                            <option value="states">States</option>
                            <option value="resources">Resources</option>
                            <option value="principles">Principles</option>
                            <option value="obligations">Obligations</option>
                            <option value="constraints">Constraints</option>
                            <option value="capabilities">Capabilities</option>
                            <option value="actions">Actions</option>
                            <option value="events">Events</option>
                        </select>
                        <button class="btn btn-sm btn-outline-secondary" onclick="clearFilters()">
                            <i class="bi bi-x-circle"></i> Clear
                        </button>
                        <span id="filter-count" class="text-muted small ms-auto"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Pipeline Timeline -->
    <div class="row">
        <div class="col-12">
            <div id="pipeline-timeline" class="pipeline-timeline">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary"></div>
                    <p class="mt-2">Loading pipeline data...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Activity Log Modal -->
<div class="modal fade" id="activityLogModal" tabindex="-1" aria-labelledby="activityLogModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="activityLogModalLabel">
                    <i class="bi bi-clock-history"></i> Activity Log
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="activity-timeline" class="activity-timeline">
                    <div class="text-center py-4">
                        <div class="spinner-border text-primary"></div>
                        <p class="mt-2 text-muted">Loading activity log...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<link rel="stylesheet" href="{{ url_for('static', filename='css/scenario_pipeline/provenance.css') }}">

<script>
    window.PROVENANCE = { caseId: {{ case.id }} };
</script>
<script src="{{ url_for('static', filename='js/scenario_pipeline/provenance.js') }}"></script>
{% endblock %}
