{% extends "base.html" %}

{% block title %}Provenance - {{ case.title }} - ProEthica{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <!-- Header -->
    <div class="row mb-3">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="mb-0">
                        <i class="bi bi-diagram-3"></i> Provenance
                    </h1>
                    <p class="text-muted mb-0">Case {{ case.id }}: {{ case.title }}</p>
                </div>
                <div class="d-flex gap-2">
                    <a href="{{ url_for('prompt_editor.index') }}" class="btn btn-outline-secondary">
                        <i class="bi bi-pencil-square"></i> Edit Templates
                    </a>
                    <button class="btn btn-outline-info" data-bs-toggle="modal" data-bs-target="#activityLogModal" id="activityLogBtn">
                        <i class="bi bi-clock-history"></i> Activity Log
                    </button>
                    <a href="{{ url_for('entity_review.review_case_entities', case_id=case.id) }}" class="btn btn-outline-primary">
                        <i class="bi bi-list-check"></i> Review
                    </a>
                    <a href="{{ url_for('scenario_pipeline.overview', case_id=case.id) }}" class="btn btn-outline-primary">
                        <i class="bi bi-list-ul"></i> Pipeline
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Filter Bar -->
    <div class="row mb-3">
        <div class="col-12">
            <div class="card filter-bar">
                <div class="card-body py-2">
                    <div class="d-flex align-items-center gap-3">
                        <label class="text-muted small mb-0">Filter:</label>
                        <select id="filter-step" class="form-select form-select-sm" style="width: auto;" onchange="applyFilters()">
                            <option value="">All Steps</option>
                            <option value="1" {% if initial_step == 1 %}selected{% endif %}>Step 1: Contextual</option>
                            <option value="2" {% if initial_step == 2 %}selected{% endif %}>Step 2: Normative</option>
                            <option value="3" {% if initial_step == 3 %}selected{% endif %}>Step 3: Temporal</option>
                            <option value="4">Step 4: Synthesis</option>
                            <option value="qc">QC Verification</option>
                            <option value="refinements">Manual Refinements</option>
                        </select>
                        <select id="filter-section" class="form-select form-select-sm" style="width: auto;" onchange="applyFilters()">
                            <option value="">All Sections</option>
                            <option value="facts" {% if initial_section == 'facts' %}selected{% endif %}>Facts</option>
                            <option value="discussion" {% if initial_section == 'discussion' %}selected{% endif %}>Discussion</option>
                        </select>
                        <select id="filter-concept" class="form-select form-select-sm" style="width: auto;" onchange="applyFilters()">
                            <option value="">All Concepts</option>
                            <option value="roles">Roles</option>
                            <option value="states">States</option>
                            <option value="resources">Resources</option>
                            <option value="principles">Principles</option>
                            <option value="obligations">Obligations</option>
                            <option value="constraints">Constraints</option>
                            <option value="capabilities">Capabilities</option>
                            <option value="actions">Actions</option>
                            <option value="events">Events</option>
                        </select>
                        <button class="btn btn-sm btn-outline-secondary" onclick="clearFilters()">
                            <i class="bi bi-x-circle"></i> Clear
                        </button>
                        <span id="filter-count" class="text-muted small ms-auto"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Pipeline Timeline -->
    <div class="row">
        <div class="col-12">
            <div id="pipeline-timeline" class="pipeline-timeline">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary"></div>
                    <p class="mt-2">Loading pipeline data...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Activity Log Modal -->
<div class="modal fade" id="activityLogModal" tabindex="-1" aria-labelledby="activityLogModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="activityLogModalLabel">
                    <i class="bi bi-clock-history"></i> Activity Log
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="activity-timeline" class="activity-timeline">
                    <div class="text-center py-4">
                        <div class="spinner-border text-primary"></div>
                        <p class="mt-2 text-muted">Loading activity log...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
/* Step colors */
:root {
    --step-1-color: #3b82f6;
    --step-2-color: #8b5cf6;
    --step-3-color: #14b8a6;
    --step-4-color: #64748b;
}

/* Filter bar */
.filter-bar {
    border-left: 4px solid #6c757d;
    background: #f8f9fa;
}

/* Timeline layout */
.pipeline-timeline {
    position: relative;
    padding-left: 30px;
}

.pipeline-card {
    position: relative;
    margin-bottom: 1rem;
}

.pipeline-card::before {
    content: '';
    position: absolute;
    left: -20px;
    top: 0;
    bottom: -1rem;
    width: 2px;
    background: #dee2e6;
}

.pipeline-card:last-child::before {
    display: none;
}

.pipeline-card::after {
    content: '';
    position: absolute;
    left: -25px;
    top: 20px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--card-color, #6c757d);
    border: 2px solid white;
    box-shadow: 0 0 0 2px var(--card-color, #6c757d);
}

/* Step header cards */
.step-header-card {
    background: linear-gradient(135deg, var(--card-color) 0%, color-mix(in srgb, var(--card-color) 80%, black) 100%);
    color: white;
}

.step-header-card .card-body {
    padding: 0.75rem 1rem;
}

/* Extraction cards */
.extraction-card {
    border-left: 4px solid var(--card-color, #6c757d);
}

.extraction-card.empty {
    opacity: 0.5;
}

.extraction-card .card-header {
    background: color-mix(in srgb, var(--card-color) 10%, white);
    border-bottom: 1px solid color-mix(in srgb, var(--card-color) 20%, white);
    padding: 0.5rem 1rem;
}

/* Prompt/Response sections */
.prompt-section, .response-section {
    background: #f8f9fa;
    border-radius: 0.375rem;
    margin-bottom: 1rem;
}

/* Synthesis trace section (Phase 3) */
.synthesis-trace-section {
    background: #f0f4f8;
    border: 1px solid #d1d9e6;
    border-radius: 0.375rem;
    padding: 0.75rem 1rem;
}
.synthesis-trace-section h6 {
    font-size: 0.9rem;
    margin-bottom: 0.5rem;
}
.synthesis-trace-section .card {
    border-color: #d1d9e6;
    font-size: 0.8rem;
}

.prompt-section .section-header,
.response-section .section-header {
    padding: 0.5rem 1rem;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.prompt-section .section-header:hover,
.response-section .section-header:hover {
    background: #e9ecef;
}

.prompt-text, .response-text {
    font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
    font-size: 0.8rem;
    max-height: 400px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-wrap: break-word;
    background: white;
    padding: 1rem;
    border-radius: 0.25rem;
    margin: 0 1rem 1rem 1rem;
    border: 1px solid #dee2e6;
}

/* Entity list */
.entity-list {
    max-height: 300px;
    overflow-y: auto;
}

.entity-item {
    background: white;
    border-left: 3px solid var(--entity-color, #6c757d);
    padding: 0.5rem 0.75rem;
    margin-bottom: 0.5rem;
    border-radius: 0.25rem;
    font-size: 0.875rem;
}

.entity-item .entity-label {
    font-weight: 600;
    color: var(--entity-color, #2e59d9);
}

.entity-item .entity-definition {
    color: #6c757d;
    font-size: 0.8rem;
}

/* Metadata bar */
.metadata-bar {
    font-size: 0.75rem;
    color: #6c757d;
    padding: 0.5rem 1rem;
    background: #f8f9fa;
    border-top: 1px solid #dee2e6;
}

/* Provenance bar */
.provenance-bar {
    font-size: 0.8rem;
    padding: 0.5rem 1rem;
    background: #f0f4ff;
    border-bottom: 1px solid #dee2e6;
    cursor: pointer;
}

.provenance-bar:hover {
    background: #e4ebff;
}

.provenance-detail {
    font-size: 0.75rem;
    background: #f8f9fa;
    border-bottom: 1px solid #dee2e6;
    padding: 0.5rem 1rem;
}

/* Origin badges */
.origin-badge {
    display: inline-block;
    font-size: 0.7rem;
    padding: 0.15rem 0.5rem;
    border-radius: 1rem;
    font-weight: 500;
}

.origin-automated_pipeline { background: #dbeafe; color: #1e40af; }
.origin-user_initiated { background: #dcfce7; color: #166534; }
.origin-individual_extraction { background: #ffedd5; color: #9a3412; }
.origin-algorithmic { background: #e5e7eb; color: #374151; }

/* Activity Log styles */
.activity-timeline {
    position: relative;
    padding-left: 30px;
}

.activity-card {
    position: relative;
    margin-bottom: 1rem;
}

.activity-card::before {
    content: '';
    position: absolute;
    left: -20px;
    top: 0;
    bottom: -1rem;
    width: 2px;
    background: #dee2e6;
}

.activity-card:last-child::before {
    display: none;
}

.activity-card::after {
    content: '';
    position: absolute;
    left: -25px;
    top: 20px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--activity-color, #6c757d);
    border: 2px solid white;
    box-shadow: 0 0 0 2px var(--activity-color, #6c757d);
}

.activity-extraction { --activity-color: #3b82f6; }
.activity-llm_query { --activity-color: #8b5cf6; }
.activity-composition { --activity-color: #14b8a6; }
.activity-alignment { --activity-color: #06b6d4; }
.activity-enrichment { --activity-color: #22c55e; }
.activity-synthesis { --activity-color: #f59e0b; }
.activity-storage { --activity-color: #64748b; }
.activity-analysis { --activity-color: #ec4899; }

.activity-card .card {
    border-left: 4px solid var(--activity-color, #6c757d);
}

.activity-card .card-header {
    background: linear-gradient(90deg, color-mix(in srgb, var(--activity-color) 10%, white), white);
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid #e3e6f0;
}

.activity-card .card-body {
    padding: 0.75rem;
}

.status-completed { background: #198754; }
.status-failed { background: #dc3545; }
.status-running { background: #0d6efd; }
</style>

<script>
    window.PROVENANCE = { caseId: {{ case.id }} };
</script>
<script src="{{ url_for('static', filename='js/scenarios/provenance.js') }}"></script>
{% endblock %}
