{% extends "base.html" %}

{% block title %}Error Loading Scenario{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="alert alert-danger">
        <h4><i class="bi bi-exclamation-circle"></i> Error Loading Scenario</h4>
        <p>An error occurred while loading the scenario for Case {{ case_id }}.</p>
        <p><strong>Error:</strong> {{ error }}</p>
    </div>

    <a href="{{ url_for('step5.step5_scenario_generation', case_id=case_id) }}" class="btn btn-primary">
        <i class="bi bi-arrow-left"></i> Back to Step 5
    </a>
</div>
{% endblock %}
