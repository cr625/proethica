{% extends "base.html" %}

{% block title %}Extraction Prompt Editor - ProEthica{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="text-center">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2 text-muted">Loading prompt editor...</p>
    </div>
</div>

<script>
    window.PROMPT_EDITOR_REDIRECT = { defaultUrl: '{{ url_for("prompt_editor.edit_template", step=1, concept="roles", domain="engineering") }}' };
</script>
<script src="{{ url_for('static', filename='js/tools/prompt_editor_redirect.js') }}"></script>
{% endblock %}
