# ProEthica Tool Configuration
# Dependencies are managed in requirements.txt (single source of truth).
# This file configures ruff, mypy, pytest, and coverage.

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "build",
    "dist",
    "*.egg-info",
]

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "N",  # pep8-naming
    "B",  # flake8-bugbear
    "C90",  # mccabe complexity
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # Line too long (handled by formatter)
    "B008",  # Do not perform function calls in argument defaults (common in Flask)
    "N802",  # Function name should be lowercase (allow Flask route names)
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false  # Start permissive, gradually enable
check_untyped_defs = true
exclude = [
    "venv-proethica/",
]

[[tool.mypy.overrides]]
module = [
    "anthropic.*",
    "langchain.*",
    "langchain_anthropic.*",
    "langchain_community.*",
    "langgraph.*",
    "rdflib.*",
    "pyzotero.*",
    "bs4.*",
    "slugify.*",
    "nltk.*",
    "sklearn.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--cov=app",
    "--cov-report=html",
    "--cov-report=term-missing",
    "-v",
]
markers = [
    "unit: Fast, hermetic unit tests",
    "integration: Database or service-dependent tests",
    "db: Requires PostgreSQL database",
    "slow: Tests that take more than 1 second",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.coverage.run]
source = ["app"]
omit = [
    "*/tests/*",
]

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = false
fail_under = 0  # Start at 0%, gradually increase to 70%

[tool.coverage.html]
directory = "htmlcov"
